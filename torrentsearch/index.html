<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <meta http-equiv="cache-control" content="no-cache">
    <meta http-equiv="expires" content="0">
    <meta http-equiv="pragma" content="no-cache">
    <title>TorSearch</title>
    <link rel="icon" href="../img/smgray-favicon.png">
    <style>
        :root {
            --ink: #121411;
            --paper: #f7f3e8;
            --paper-2: #fffdf6;
            --muted: #686b63;
            --line: rgba(18, 20, 17, 0.14);
            --teal: #18c7a2;
            --clay: #df5f27;
            --blue: #5e71e7;
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background:
                linear-gradient(rgba(18, 20, 17, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 20, 17, 0.035) 1px, transparent 1px),
                radial-gradient(circle at 18% 18%, rgba(24, 199, 162, 0.16), transparent 30%),
                radial-gradient(circle at 86% 12%, rgba(255, 191, 31, 0.18), transparent 30%),
                var(--paper);
            background-size: 32px 32px, 32px 32px, auto, auto, auto;
            color: var(--ink);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page {
            width: min(100% - 40px, 980px);
            margin: 0 auto;
            padding: 52px 0;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 44px;
            font-weight: 900;
        }

        .brand img {
            width: 42px;
            height: 42px;
            border-radius: 10px;
        }

        .hero {
            max-width: 760px;
            margin-bottom: 26px;
        }

        h1 {
            margin: 0 0 14px;
            font-size: clamp(42px, 7vw, 76px);
            line-height: 0.94;
            letter-spacing: 0;
        }

        .lead {
            max-width: 620px;
            margin: 0;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.6;
        }

        .search-card {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            margin-bottom: 18px;
            padding: 10px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: rgba(255, 253, 246, 0.86);
            box-shadow: 0 20px 48px rgba(18, 20, 17, 0.1);
        }

        label {
            display: grid;
            gap: 6px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
        }

        input {
            width: 100%;
            min-height: 52px;
            padding: 0 16px;
            border: 1px solid var(--line);
            border-radius: 13px;
            background: var(--paper-2);
            color: var(--ink);
            font: inherit;
            font-size: 18px;
            outline: none;
        }

        input:focus {
            border-color: rgba(18, 20, 17, 0.42);
            box-shadow: 0 0 0 4px rgba(24, 199, 162, 0.13);
        }

        button {
            align-self: end;
            min-height: 52px;
            padding: 0 18px;
            border: 1px solid var(--ink);
            border-radius: 999px;
            background: var(--ink);
            color: var(--paper-2);
            cursor: pointer;
            font: inherit;
            font-weight: 900;
        }

        .sites {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .site-card {
            display: grid;
            gap: 18px;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: rgba(255, 253, 246, 0.88);
            box-shadow: 0 14px 34px rgba(18, 20, 17, 0.08);
            transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
        }

        .site-card:hover {
            transform: translateY(-2px);
            border-color: rgba(18, 20, 17, 0.28);
            box-shadow: 0 20px 44px rgba(18, 20, 17, 0.12);
        }

        .site-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
        }

        .site-name {
            margin: 0;
            font-size: 22px;
            line-height: 1.1;
        }

        .dot {
            width: 12px;
            height: 12px;
            flex: 0 0 auto;
            border-radius: 999px;
            background: var(--teal);
        }

        .site-card:nth-child(2) .dot,
        .site-card:nth-child(5) .dot {
            background: var(--clay);
        }

        .site-card:nth-child(3) .dot {
            background: var(--blue);
        }

        .url {
            min-height: 42px;
            overflow-wrap: anywhere;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
        }

        .open-link {
            min-height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding-top: 12px;
            border-top: 1px solid var(--line);
            font-weight: 900;
        }

        .empty .open-link {
            pointer-events: none;
            color: var(--muted);
        }

        @media (max-width: 720px) {
            .page {
                width: min(100% - 28px, 980px);
                padding: 28px 0;
            }

            .brand {
                margin-bottom: 28px;
            }

            .search-card,
            .sites {
                grid-template-columns: 1fr;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <a class="brand" href="/" aria-label="SMGray home">
            <img src="../img/smgray-favicon.png" alt="">
            <span>TorSearch</span>
        </a>

        <section class="hero" aria-labelledby="title">
            <h1 id="title">Multi-site search.</h1>
            <p class="lead">One private shortcut page for building search links across the torrent indexes you already use.</p>
        </section>

        <form class="search-card" id="searchForm">
            <label for="searchTerm">
                Search term
                <input id="searchTerm" name="searchTerm" autocomplete="off" autofocus>
            </label>
            <button type="submit">Open all</button>
        </form>

        <section class="sites" id="sites" aria-label="Torrent search sites"></section>
    </main>

    <template id="siteTemplate">
        <article class="site-card empty">
            <div class="site-top">
                <h2 class="site-name"></h2>
                <span class="dot" aria-hidden="true"></span>
            </div>
            <div class="url"></div>
            <a class="open-link" target="_blank" rel="noopener">Open <span aria-hidden="true">-&gt;</span></a>
        </article>
    </template>

    <script>
        const sites = [
            {
                name: "Pirate Bay",
                home: "https://thepiratebay.org/",
                buildUrl: (term) => `https://thepiratebay.org/search.php?q=${encodeURIComponent(term)}`
            },
            {
                name: "1337x",
                home: "https://1337x.to/home/",
                buildUrl: (term) => `https://1337x.to/search/${encodeURIComponent(term)}/1/`
            },
            {
                name: "Torrent Galaxy",
                home: "https://torrentgalaxy.to/",
                buildUrl: (term) => `https://torrentgalaxy.to/torrents.php?search=${encodeURIComponent(term)}&sort=seeders&order=desc`
            },
            {
                name: "BitSearch",
                home: "https://bitsearch.to/",
                buildUrl: (term) => `https://bitsearch.to/search?q=${encodeURIComponent(term)}&sort=seeders`
            },
            {
                name: "IPTorrents",
                home: "https://iptorrents.com/t",
                buildUrl: (term) => `https://iptorrents.com/t?q=${encodeURIComponent(term)};o=seeders#torrents`
            }
        ];

        const form = document.querySelector("#searchForm");
        const input = document.querySelector("#searchTerm");
        const sitesRoot = document.querySelector("#sites");
        const template = document.querySelector("#siteTemplate");

        const params = new URLSearchParams(window.location.search);
        input.value = params.get("searchTerm") || "";

        function renderSites() {
            const term = input.value.trim();
            sitesRoot.replaceChildren();

            sites.forEach((site) => {
                const card = template.content.firstElementChild.cloneNode(true);
                const url = term ? site.buildUrl(term) : site.home;
                card.classList.toggle("empty", !term);
                card.querySelector(".site-name").textContent = site.name;
                card.querySelector(".url").textContent = url;
                card.querySelector(".open-link").href = url;
                sitesRoot.appendChild(card);
            });
        }

        function syncUrl() {
            const params = new URLSearchParams(window.location.search);
            const term = input.value.trim();

            if (term) {
                params.set("searchTerm", term);
            } else {
                params.delete("searchTerm");
            }

            const nextUrl = `${window.location.pathname}${params.toString() ? `?${params}` : ""}`;
            window.history.replaceState({}, "", nextUrl);
        }

        input.addEventListener("input", () => {
            syncUrl();
            renderSites();
        });

        form.addEventListener("submit", (event) => {
            event.preventDefault();
            const term = input.value.trim();
            if (!term) {
                input.focus();
                return;
            }

            sites.forEach((site) => {
                window.open(site.buildUrl(term), "_blank", "noopener");
            });
        });

        renderSites();
    </script>
</body>
</html>
