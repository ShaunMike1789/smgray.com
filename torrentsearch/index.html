<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <meta http-equiv="cache-control" content="no-cache">
    <meta http-equiv="expires" content="0">
    <meta http-equiv="pragma" content="no-cache">
    <title>TorSearch</title>
    <link rel="icon" type="image/png" sizes="512x512" href="/img/smgray-favicon.png?v=2">
    <style>
        :root {
            --ink: #121411;
            --paper: #f7f3e8;
            --paper-2: #fffdf6;
            --muted: #686b63;
            --line: rgba(18, 20, 17, 0.14);
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background:
                linear-gradient(rgba(18, 20, 17, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 20, 17, 0.035) 1px, transparent 1px),
                radial-gradient(circle at 18% 18%, rgba(24, 199, 162, 0.16), transparent 30%),
                radial-gradient(circle at 86% 12%, rgba(255, 191, 31, 0.18), transparent 30%),
                var(--paper);
            background-size: 32px 32px, 32px 32px, auto, auto, auto;
            color: var(--ink);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .page {
            width: min(100% - 40px, 980px);
            margin: 0 auto;
            padding: 52px 0;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 44px;
            color: inherit;
            text-decoration: none;
            font-weight: 900;
        }

        .brand img {
            width: 42px;
            height: 42px;
            border-radius: 10px;
        }

        .hero {
            max-width: 760px;
            margin-bottom: 26px;
        }

        h1 {
            margin: 0 0 14px;
            font-size: clamp(42px, 7vw, 76px);
            line-height: 0.94;
            letter-spacing: 0;
        }

        .lead {
            max-width: 620px;
            margin: 0;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.6;
        }

        .search-card {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: rgba(255, 253, 246, 0.86);
            box-shadow: 0 20px 48px rgba(18, 20, 17, 0.1);
        }

        label {
            display: grid;
            gap: 6px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
        }

        input {
            width: 100%;
            min-height: 52px;
            padding: 0 16px;
            border: 1px solid var(--line);
            border-radius: 13px;
            background: var(--paper-2);
            color: var(--ink);
            font: inherit;
            font-size: 18px;
            outline: none;
        }

        input:focus {
            border-color: rgba(18, 20, 17, 0.42);
            box-shadow: 0 0 0 4px rgba(24, 199, 162, 0.13);
        }

        button {
            min-height: 52px;
            border: 1px solid var(--ink);
            border-radius: 999px;
            background: var(--ink);
            color: var(--paper-2);
            cursor: pointer;
            font: inherit;
            font-weight: 900;
        }

        .open-all {
            align-self: end;
            padding: 0 18px;
        }

        .status {
            min-height: 22px;
            margin: 0 0 18px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
        }

        .sites {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .site-card {
            display: grid;
            gap: 18px;
            min-height: 170px;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: rgba(255, 253, 246, 0.88);
            box-shadow: 0 14px 34px rgba(18, 20, 17, 0.08);
            text-align: left;
            transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
        }

        .site-card:hover {
            transform: translateY(-2px);
            border-color: rgba(18, 20, 17, 0.28);
            box-shadow: 0 20px 44px rgba(18, 20, 17, 0.12);
        }

        .site-card:focus-visible {
            outline: 4px solid rgba(24, 199, 162, 0.2);
        }

        .site-name {
            margin: 0;
            color: var(--ink);
            font-size: 22px;
            line-height: 1.1;
        }

        .url {
            min-height: 42px;
            overflow-wrap: anywhere;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
        }

        .site-action {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding-top: 12px;
            border-top: 1px solid var(--line);
            color: var(--ink);
            font-weight: 900;
        }

        @media (max-width: 720px) {
            .page {
                width: min(100% - 28px, 980px);
                padding: 28px 0;
            }

            .brand {
                margin-bottom: 28px;
            }

            .search-card,
            .sites {
                grid-template-columns: 1fr;
            }

            .open-all {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <a class="brand" href="/" aria-label="SMGray home">
            <img src="../img/smgray-favicon.png" alt="">
            <span>TorSearch</span>
        </a>

        <section class="hero" aria-labelledby="title">
            <h1 id="title">Multi-site search.</h1>
            <p class="lead">One private shortcut page for building search links across the torrent indexes you already use.</p>
        </section>

        <form class="search-card" id="searchForm">
            <label for="searchTerm">
                Search term
                <input id="searchTerm" name="searchTerm" autocomplete="off" autofocus>
            </label>
            <button class="open-all" type="submit">Open all</button>
        </form>
        <p class="status" id="status" role="status" aria-live="polite"></p>

        <section class="sites" id="sites" aria-label="Torrent search sites"></section>
    </main>

    <template id="siteTemplate">
        <button class="site-card" type="button">
            <h2 class="site-name"></h2>
            <div class="url"></div>
            <span class="site-action">Open <span aria-hidden="true">-&gt;</span></span>
        </button>
    </template>

    <script>
        const sites = [
            {
                name: "Pirate Bay",
                home: "https://thepiratebay.org/",
                buildUrl: (term) => `https://thepiratebay.org/search.php?q=${encodeURIComponent(term)}`
            },
            {
                name: "1337x",
                home: "https://1337x.to/home/",
                buildUrl: (term) => `https://1337x.to/search/${encodeURIComponent(term)}/1/`
            },
            {
                name: "Torrent Galaxy",
                home: "https://torrentgalaxy.to/",
                buildUrl: (term) => `https://torrentgalaxy.to/torrents.php?search=${encodeURIComponent(term)}&sort=seeders&order=desc`
            },
            {
                name: "BitSearch",
                home: "https://bitsearch.to/",
                buildUrl: (term) => `https://bitsearch.to/search?q=${encodeURIComponent(term)}&sort=seeders`
            },
            {
                name: "IPTorrents",
                home: "https://iptorrents.com/t",
                buildUrl: (term) => `https://iptorrents.com/t?q=${encodeURIComponent(term)};o=seeders#torrents`
            }
        ];

        const form = document.querySelector("#searchForm");
        const input = document.querySelector("#searchTerm");
        const sitesRoot = document.querySelector("#sites");
        const status = document.querySelector("#status");
        const template = document.querySelector("#siteTemplate");
        const params = new URLSearchParams(window.location.search);

        input.value = params.get("searchTerm") || "";

        function currentUrl(site, term) {
            return term ? site.buildUrl(term) : site.home;
        }

        function currentTargets() {
            const term = input.value.trim();
            return sites.map((site) => ({
                name: site.name,
                url: currentUrl(site, term)
            }));
        }

        function syncUrl() {
            const nextParams = new URLSearchParams();
            const term = input.value.trim();

            if (term) {
                nextParams.set("searchTerm", term);
            }

            const nextUrl = `${window.location.pathname}${nextParams.toString() ? `?${nextParams}` : ""}`;
            window.history.replaceState({}, "", nextUrl);
        }

        function focusThisPage() {
            setTimeout(() => {
                window.focus();
                input.focus({ preventScroll: true });
            }, 50);
        }

        function openTarget(target) {
            const tab = window.open(target.url, "_blank");

            if (tab) {
                try {
                    tab.opener = null;
                    tab.blur();
                } catch (error) {
                    // Some browsers restrict focus control on cross-origin tabs.
                }

                focusThisPage();
                status.textContent = `Opened ${target.name}.`;
                return true;
            }

            status.textContent = `Chrome blocked ${target.name}. Allow pop-ups for smgray.com.`;
            return false;
        }

        function openTargets(targets) {
            let opened = 0;

            targets.forEach((target) => {
                if (openTarget(target)) {
                    opened += 1;
                }
            });

            focusThisPage();
            status.textContent = opened === targets.length
                ? `Opened ${opened} tabs.`
                : `Chrome opened ${opened} of ${targets.length} tabs. Allow pop-ups for smgray.com, then try again.`;
        }

        function renderSites() {
            const term = input.value.trim();
            sitesRoot.replaceChildren();

            sites.forEach((site) => {
                const card = template.content.firstElementChild.cloneNode(true);
                const target = {
                    name: site.name,
                    url: currentUrl(site, term)
                };

                card.querySelector(".site-name").textContent = site.name;
                card.querySelector(".url").textContent = target.url;
                card.addEventListener("click", () => openTarget(target));
                sitesRoot.appendChild(card);
            });
        }

        input.addEventListener("input", () => {
            syncUrl();
            renderSites();
            status.textContent = "";
        });

        form.addEventListener("submit", (event) => {
            event.preventDefault();
            openTargets(currentTargets());
        });

        renderSites();
    </script>
</body>
</html>
